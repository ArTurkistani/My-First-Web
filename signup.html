                </ul>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <ul class="nav nav-tabs mb-4" id="signupTab" role="tablist">
                    <li class="nav-item" role="presentation" aria-selected="true">
                        <button class="nav-link active" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button" role="tab" >Sign Up</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" >Login</button>
                    </li>
                </ul>

                <div class="tab-content" id="MyTabContent">

                <div class="tab-pane fade show active" id="signup" role="tabpanel" >
                    <h3 class="mb-4">Create an Account</h3>
                    <form action="#" method="POST" class="shadow p-4 rounded bg-light" onsubmit="return validateEmail()">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter your username" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </form>
                </div>

                <div class="tab-pane fade" id="login" role="tabpanel">
                    <h3 class="mb-4">Welcome Back</h3>
                    <form action="#" method="POST" class="shadow p-4 rounded bg-light" onsubmit="return varEmail()">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Login</button>
                    </form>
                </div>
            </div>
        
    </main>

    <script>
function validateEmail() {
    var emailInput = document.getElementById('email').value; 
    
    var allowedDomains = ["@gmail.com", "@hotmail.com"];
    var isValid = false;

    for (var i = 0; i < allowedDomains.length; i++) {
        if (emailInput.endsWith(allowedDomains[i])) {
            isValid = true;
            break;
        }
    }

    if (!isValid) {
        alert("Please enter a valid email address ending with @gmail.com or @hotmail.com");
        return false; 
    }
    
    alert("successfully registered!");
    return true; 
}
</script>
<script>
    function varEmail() {
        var emailInput = document.getElementById('loginEmail').value;

        var allowedDomains = ["@gmail.com", "@hotmail.com"];
        
        var isValid = false;


        for (var i = 0; i < allowedDomains.length; i++) {
            if (emailInput.endsWith(allowedDomains[i])) {
                isValid = true;
                break;
            }
        }
        if (!isValid) {
            alert("Please enter a valid email address ending with @gmail.com or @hotmail.com");
            return false; 
        }
        alert("successfully logged in!");
        return true;
    }
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
